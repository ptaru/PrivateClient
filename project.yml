name: PrivateClient
options:
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: CM6PR6R3U2
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: 26.4
packages:
  Partout:
    url: https://github.com/partout-io/partout
    branch: master
schemes:
  PrivateClient:
    build:
      targets:
        PrivateClient: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PrivateClientTests
    archive:
      config: Release
  PrivateClientTunnel:
    build:
      targets:
        PrivateClientTunnel: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  PrivateClient:
    type: application
    platform: macOS
    deploymentTarget: "26.4"
    sources:
      - path: PrivateClient
      - path: PrivateClientShared
    resources:
      - path: PrivateClient/Assets.xcassets
      - path: PrivateClient/Resources
    info:
      path: PrivateClient/App.plist
    entitlements:
      path: PrivateClient/App.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.uk.tarun.PrivateClient
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)group.uk.tarun.PrivateClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.tarun.PrivateClient
        PRODUCT_NAME: PrivateClient
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SELECTED_FILES: readonly
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Partout
        product: partout
      - target: PrivateClientTunnel
        embed: true

  PrivateClientTunnel:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.4"
    sources:
      - path: PrivateClientTunnel
      - path: PrivateClientShared
    info:
      path: PrivateClientTunnel/Tunnel.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: PrivateClientTunnel/Tunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.uk.tarun.PrivateClient
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)group.uk.tarun.PrivateClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.tarun.PrivateClient.tunnel
        PRODUCT_NAME: PrivateClientTunnel
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
    dependencies:
      - package: Partout
        product: partout

  PrivateClientTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.4"
    sources:
      - path: PrivateClientTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: uk.tarun.PrivateClientTests
    dependencies:
      - target: PrivateClient
      - package: Partout
        product: partout
